[build]
  publish = "site/"
  command = "echo 'Static site — no build step needed'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/data/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/states/"
  to = "/states/index.html"
  status = 200

[[redirects]]
  from = "/methodology"
  to = "/methodology/index.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
