<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All 50 States — State Finance Platform</title>
  <meta name="description" content="Sortable fiscal data for all 50 U.S. states: revenue, expenditure, debt, pensions, reserves, and credit ratings.">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav class="site-nav"></nav>

  <main class="container">
    <div class="page-header">
      <h1>All 50 States</h1>
      <p class="subtitle">Key fiscal metrics for every state. Sortable by any column. Search by name.</p>
    </div>

    <div class="card" style="border-left:3px solid var(--color-accent);margin-bottom:2rem;">
      <p style="margin:0;font-size:0.9rem;">Detailed fiscal profiles are available for <a href="/states/wi.html">Wisconsin</a> and <a href="/states/mn.html">Minnesota</a>. Additional state profiles are coming soon.</p>
    </div>

    <section class="section">
      <div id="states-table"></div>
      <div id="states-freshness" style="text-align:right;margin-top:0.5rem;"></div>
    </section>
  </main>

  <footer class="site-footer"></footer>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/charts.js"></script>
  <script>
    (function() {
      var PROFILE_STATES = ['wi', 'mn'];

      var TABLE_COLUMNS = [
        {
          key: 'name',
          label: 'State',
          render: function(val, d) {
            var abbr = d.abbrev.toLowerCase();
            if (PROFILE_STATES.indexOf(abbr) >= 0) {
              return '<a class="state-link" href="/states/' + abbr + '.html">' + val + '</a>';
            }
            return '<strong>' + val + '</strong>';
          },
        },
        { key: 'abbrev', label: 'Abbrev' },
        { key: 'revenuePerCapita', label: 'Rev/Capita', format: SFP.formatPerCapita, numeric: true },
        { key: 'expenditurePerCapita', label: 'Exp/Capita', format: SFP.formatPerCapita, numeric: true },
        { key: 'pensionFundedRatio', label: 'Pension %', format: function(v) { return SFP.formatPercent(v); }, numeric: true },
        { key: 'debtPerCapita', label: 'Debt/Capita', format: SFP.formatPerCapita, numeric: true },
        { key: 'reserveDays', label: 'Reserve Days', format: function(v) { return SFP.formatNumber(v, 0); }, numeric: true },
        { key: 'creditRating', label: 'Rating' },
      ];

      function init() {
        SFP.loadJSON('/data/states-summary.json')
          .then(function(data) {
            SFP.sortableTable('#states-table', data.states, TABLE_COLUMNS, {
              defaultSort: 'name',
              defaultAsc: true,
            });
            SFP.renderFreshness('#states-freshness', 'Multiple sources', data.generated, data.sample);

            // Support hash-based filtering (e.g., /states/index.html#WI)
            applyHashFilter();
            window.addEventListener('hashchange', applyHashFilter);
          })
          .catch(function(err) {
            console.error('Failed to load state data:', err);
          });
      }

      function applyHashFilter() {
        var hash = window.location.hash.replace('#', '').toUpperCase();
        if (!hash) return;
        var searchBox = document.querySelector('.search-box');
        if (searchBox) {
          searchBox.value = hash;
          searchBox.dispatchEvent(new Event('input'));
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
