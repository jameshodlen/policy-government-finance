name: Generate Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Sunday midnight UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipelines/requirements.txt

      - name: Generate sample data
        run: python -m pipelines.generate_sample_data

      - name: Run data pipelines
        run: python -m pipelines.run_all
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit updated data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate data files'
          file_pattern: 'site/data/**/*.json'
